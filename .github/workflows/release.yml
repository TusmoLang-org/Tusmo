name: release

permissions:
  contents: write

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triplet: linux-x86_64
          - os: windows-2022
            triplet: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev zig
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          release: true
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-libgc

      - name: Install zig (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install -y zig

      - name: Install PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Freeze tusmo CLI
        run: pyinstaller --onefile tusmo.py

      - name: Collect bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          cp /usr/lib/x86_64-linux-gnu/libgc.a bundle/lib/
          cp -r /usr/include/gc bundle/include/
          cp dist/tusmo bundle/bin/
          cp "$(which zig)" bundle/toolchain/zig
          printf '%s\n' '#!/usr/bin/env bash' 'exec "$(dirname "$0")/toolchain/zig" cc "$@"' > bundle/toolchain/cc
          chmod +x bundle/toolchain/cc

      - name: Collect bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bundle/lib bundle/include bundle/bin bundle/runtime bundle/stdlib bundle/toolchain
          cp -r runtime stdlib bundle/
          cp dist/tusmo.exe bundle/bin/
          cp /c/msys64/mingw64/lib/libgc.a bundle/lib/ || true
          cp -r /c/msys64/mingw64/include/gc bundle/include/ || true
          cp /c/ProgramData/chocolatey/lib/zig/tools/zig.exe bundle/toolchain/zig.exe
          cat > bundle/toolchain/cc.bat <<'EOS'
          @echo off
          "%~dp0\zig.exe" cc %*
          EOS

      - name: Package
        shell: bash
        run: tar -czf tusmo-${{ matrix.triplet }}.tar.gz -C bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: tusmo-${{ matrix.triplet }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
