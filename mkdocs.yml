site_name: Tusmo
site_description: A Somali programming language that compiles to C
site_url: https://tusmolang.github.io/Tusmo/

repo_url: https://github.com/Tusmolang/Tusmo
repo_name: Tusmolang/Tusmo

theme:
  name: material
  palette: 
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: black
      accent: cyan
  favicon: favicon.svg
  logo: favicon.svg

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

